<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JW Notebook Pro</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #4a5a7d; 
            --secondary: #6e5e8c; 
            --bg: #f0f2f5;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; touch-action: manipulation; }
        
        header { background: var(--primary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100;}
        header h1 { font-size: 18px; margin: 0; }
        .week-bar { background: #fff; padding: 10px; display: flex; gap: 10px; border-bottom: 1px solid #ddd; }
        select { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #ccc; background: #fafafa; }

        .content { padding: 15px; padding-bottom: 90px; }
        .card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 4px solid var(--primary); }
        .card.asamblea { border-left-color: var(--secondary); }
        
        .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-weight: bold; color: var(--primary); }
        .card.asamblea .card-header { color: var(--secondary); font-size: 15px;}
        .meta-text { font-size: 12px; color: #777; margin-bottom: 10px; display: block; }
        
        textarea { width: 100%; min-height: 100px; border: 1px solid #eee; border-radius: 8px; padding: 10px; font-size: 16px; resize: none; background: #fafafa; box-sizing: border-box; }

        /* Navegación Inferior */
        nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; border-top: 1px solid #ddd; height: 70px; z-index: 100;}
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #777; border: none; background: none; font-size: 12px; cursor: pointer;}
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item.purple.active { color: var(--secondary); }

        /* Lienzo Canvas */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; display: none; flex-direction: column; }
        canvas { flex: 1; touch-action: none; cursor: crosshair; }
        .canvas-tools { background: #333; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .dia-divider { background: var(--secondary); color: white; padding: 10px; border-radius: 8px; margin: 20px 0 10px 0; font-weight: bold; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1 id="header-title"><i class="fa-solid fa-book-open"></i> Cuaderno JW</h1>
    <button onclick="sincronizar()" style="background:none; border:none; color:white; font-size:20px; cursor:pointer;"><i class="fa-solid fa-rotate"></i></button>
</header>

<div class="content">
    <!-- PESTAÑA REUNIONES -->
    <div id="tab-reuniones" class="tab-content">
        <div class="week-bar" style="margin: -15px -15px 15px -15px;">
            <select id="semana-select" onchange="cargarDatosSemana()"></select>
        </div>
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-gem"></i> <span id="title-perlas">Perlas Escondidas</span></div>
            <span class="meta-text" id="desc-lectura"></span>
            <textarea id="note-perlas" placeholder="Notas de la lectura..." oninput="guardarReunion()"></textarea>
            <button onclick="abrirCanvas('perlas')" style="margin-top:10px; border:none; background:#eee; padding:8px; border-radius:5px; width:100%;"><i class="fa-solid fa-pen"></i> Dibujar Esquema</button>
        </div>
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-microphone-lines"></i> <span id="title-discurso">Discurso Público</span></div>
            <textarea id="note-discurso" placeholder="Notas del discurso..." oninput="guardarReunion()"></textarea>
        </div>
        <div class="card">
            <div class="card-header"><i class="fa-solid fa-newspaper"></i> <span id="title-atalaya">La Atalaya</span></div>
            <textarea id="note-atalaya" placeholder="Párrafos y comentarios..." oninput="guardarReunion()"></textarea>
        </div>
    </div>

    <!-- PESTAÑA ASAMBLEAS -->
    <div id="tab-asambleas" class="tab-content" style="display:none;">
        <div id="contenedor-asamblea">
            <!-- Aquí se generan las tarjetas de la asamblea automáticamente -->
            <p style="text-align:center; color:#777; margin-top:50px;">Sincroniza para cargar el programa de la Asamblea</p>
        </div>
    </div>
</div>

<!-- SISTEMA DE DIBUJO -->
<div id="canvas-container">
    <div class="canvas-tools">
        <button onclick="cerrarCanvas()" style="color:white; background:none; border:none; font-size:20px;"><i class="fa-solid fa-xmark"></i></button>
        <span><i class="fa-solid fa-pencil"></i> Modo Lápiz</span>
        <button onclick="limpiarCanvas()" style="color:white; background:none; border:none; font-size:20px;"><i class="fa-solid fa-eraser"></i></button>
        <button onclick="guardarImagenCanvas()" style="color:#aaffaa; background:none; border:none; font-size:20px;"><i class="fa-solid fa-check"></i></button>
    </div>
    <canvas id="dibujoCanvas"></canvas>
</div>

<nav>
    <button class="nav-item active" onclick="showTab('tab-reuniones', this)"><i class="fa-solid fa-calendar-week"></i>Reuniones</button>
    <button class="nav-item purple" onclick="showTab('tab-asambleas', this)"><i class="fa-solid fa-building-columns"></i>Asamblea</button>
</nav>

<script>
    let programaReuniones = [];
    let programaAsambleas = [];
    let idCanvasActual = "";

    // LÓGICA DE DIBUJO
    const canvas = document.getElementById('dibujoCanvas');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    function abrirCanvas(idNota) {
        idCanvasActual = 'dibujo_' + idNota;
        document.getElementById('canvas-container').style.display = 'flex';
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - 60;
        ctx.strokeStyle = "#2e3d52";
        ctx.lineWidth = 2.5;
        ctx.lineJoin = "round";
        ctx.lineCap = "round";
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const dataURL = localStorage.getItem(idCanvasActual);
        if (dataURL) {
            const img = new Image();
            img.src = dataURL;
            img.onload = () => ctx.drawImage(img, 0, 0);
        }
    }

    function cerrarCanvas() { document.getElementById('canvas-container').style.display = 'none'; }
    function limpiarCanvas() { ctx.clearRect(0, 0, canvas.width, canvas.height); }
    function guardarImagenCanvas() {
        localStorage.setItem(idCanvasActual, canvas.toDataURL());
        cerrarCanvas();
        alert("Dibujo guardado");
    }

    canvas.addEventListener('touchstart', (e) => { dibujando = true; ctx.beginPath(); ctx.moveTo(e.touches[0].clientX, e.touches[0].clientY - 60); });
    canvas.addEventListener('touchmove', (e) => {
        if (!dibujando) return;
        e.preventDefault();
        ctx.lineTo(e.touches[0].clientX, e.touches[0].clientY - 60);
        ctx.stroke();
    }, {passive: false});
    canvas.addEventListener('touchend', () => { dibujando = false; });

    // LÓGICA DE DATOS
    async function sincronizar() {
        const url = localStorage.getItem('jw_script_url');
        if(!url) { 
            const inputUrl = prompt("Pega aquí la URL de Google Apps Script para conectarte:");
            if(inputUrl) { localStorage.setItem('jw_script_url', inputUrl); sincronizar(); }
            return; 
        }
        
        document.getElementById('header-title').innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Sincronizando...';
        
        try {
            const res = await fetch(url);
            const data = await res.json();
            
            if(data.reuniones) programaReuniones = data.reuniones;
            if(data.asambleas) programaAsambleas = data.asambleas;
            
            localStorage.setItem('jw_reuniones', JSON.stringify(programaReuniones));
            localStorage.setItem('jw_asambleas', JSON.stringify(programaAsambleas));
            
            poblarSemanas();
            renderizarAsamblea();
            document.getElementById('header-title').innerHTML = '<i class="fa-solid fa-book-open"></i> Cuaderno JW';
            alert("¡Programa actualizado!");
        } catch(e) { 
            document.getElementById('header-title').innerHTML = '<i class="fa-solid fa-book-open"></i> Cuaderno JW';
            alert("Error al conectar. Verifica tu internet o la URL."); 
        }
    }

    function poblarSemanas() {
        const select = document.getElementById('semana-select');
        select.innerHTML = programaReuniones.map(s => `<option value="${s.fecha}">${s.fecha}</option>`).join('');
        cargarDatosSemana();
    }

    function cargarDatosSemana() {
        const fecha = document.getElementById('semana-select').value;
        const info = programaReuniones.find(p => p.fecha === fecha);
        if(info) {
            document.getElementById('desc-lectura').innerText = info.lectura;
            document.getElementById('title-perlas').innerText = info.perlas || "Perlas Escondidas";
            document.getElementById('title-atalaya').innerText = info.atalaya || "La Atalaya";
            document.getElementById('title-discurso').innerText = info.discurso || "Discurso Público";
        }
        document.getElementById('note-perlas').value = localStorage.getItem('n_per_'+fecha) || "";
        document.getElementById('note-atalaya').value = localStorage.getItem('n_ata_'+fecha) || "";
        document.getElementById('note-discurso').value = localStorage.getItem('n_dis_'+fecha) || "";
    }

    function guardarReunion() {
        const fecha = document.getElementById('semana-select').value;
        localStorage.setItem('n_per_'+fecha, document.getElementById('note-perlas').value);
        localStorage.setItem('n_ata_'+fecha, document.getElementById('note-atalaya').value);
        localStorage.setItem('n_dis_'+fecha, document.getElementById('note-discurso').value);
    }

    function renderizarAsamblea() {
        const contenedor = document.getElementById('contenedor-asamblea');
        if(!programaAsambleas || programaAsambleas.length === 0) return;
        
        contenedor.innerHTML = "";
        let diaActual = "";

        programaAsambleas.forEach((item, index) => {
            if(item.dia !== diaActual) {
                diaActual = item.dia;
                contenedor.innerHTML += `<div class="dia-divider">${diaActual.toUpperCase()}</div>`;
            }

            const valorNota = localStorage.getItem('n_asm_' + index) || "";
            
            contenedor.innerHTML += `
                <div class="card asamblea">
                    <div class="card-header"><i class="fa-solid fa-microphone"></i> ${item.titulo}</div>
                    <span class="meta-text"><i class="fa-regular fa-clock"></i> ${item.hora} | ${item.sesion}</span>
                    <textarea id="asm_${index}" placeholder="Toma tus notas aquí..." oninput="localStorage.setItem('n_asm_${index}', this.value)">${valorNota}</textarea>
                    <button onclick="abrirCanvas('asm_${index}')" style="margin-top:10px; border:none; background:#eee; padding:8px; border-radius:5px; width:100%; color: var(--secondary);"><i class="fa-solid fa-pen-nib"></i> Dibujar Apuntes</button>
                </div>
            `;
        });
    }

    function showTab(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        btn.classList.add('active');
    }

    window.onload = () => {
        const cacheR = localStorage.getItem('jw_reuniones');
        const cacheA = localStorage.getItem('jw_asambleas');
        if(cacheR) { programaReuniones = JSON.parse(cacheR); poblarSemanas(); }
        if(cacheA) { programaAsambleas = JSON.parse(cacheA); renderizarAsamblea(); }
    };
</script>
</body>
</html>
